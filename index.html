<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berriz - 等候室</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video class="fullscreen-bg-video" autoplay loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>
    
    <button id="unmute-btn" class="unmute-btn" title="開啟聲音">
        🔇 點擊開啟音效
    </button>

    <div class="container">
        <div class="video-bg">
            <img src="concert.gif" alt="(G)I-DLE 演唱會動畫 (請將您的 GIF 命名為 concert.gif 並放在同個資料夾)">
        </div>
        <div class="content-overlay">
            <div class="berry-logo">
                <div class="berry-dot"></div>
                <div class="berry-dot"></div>
                <div class="berry-dot"></div>
            </div>
            <h1>Berriz</h1>
            <h2>全球粉絲湧入中，請稍候</h2>
            <p class="message">目前有大量粉絲正在搶購限量周邊與演唱會票券，我們正在為您安排連線...</p>
            <div class="status-box">
                <p>將在 <span id="countdown">15</span> 秒後自動重試</p>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>
            <p class="tip">🍒 小提醒：請勿重新整理頁面，以免失去目前的排隊順序</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
